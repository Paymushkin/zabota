      <section
        class="hero hero--glitch"
        aria-label="Спортивная страховка телевизора от Яндекс Маркета и Заботы"
        data-hero-glitch
      >
        <div class="hero__pin" data-hero-pin>
          <div class="hero__sticky">
            <div class="hero-glitch__bg" data-hero-glitch-bg aria-hidden="true">
              <img
                class="hero-glitch__photo"
                data-hero-glitch-photo
                src="/hero/hero-bg.webp"
                width="1920"
                height="1223"
                alt=""
                decoding="async"
                fetchpriority="high"
              />
              <div class="hero-glitch__fx">
                <div class="hero-glitch__stripes" data-hero-glitch-stripes aria-hidden="true"></div>
                <div class="hero-glitch__scan hero-glitch__scan--bottom" aria-hidden="true"></div>
              </div>
            </div>
            <div class="hero__dim" aria-hidden="true"></div>
            <div class="hero__ball" data-hero-ball aria-hidden="true">
              <img
                class="hero__ball__img"
                src="/img/ball.webp"
                width="1200"
                height="1200"
                alt=""
                decoding="async"
                fetchpriority="low"
              />
            </div>
            <div class="hero__overlay">
              <header class="hero__header">
                <img
                  class="hero__logo"
                  src="/img/logo.svg"
                  width="369"
                  height="35"
                  alt="Яндекс Маркет и Забота"
                  decoding="async"
                  fetchpriority="low"
                />
              </header>
              <div class="hero__scenes">
                <div class="hero__scene hero__scene--1" data-hero-scene="1">
                  <h1 class="hero__title" id="hero-glitch-scene-1-title">
                    Телевизор<br />
                    выглядит так после<br />
                    матча?
                  </h1>
                </div>
                <div class="hero__scene hero__scene--2" data-hero-scene="2">
                  <h2 class="hero__title" id="hero-glitch-scene-2-title">
                    Понятно.<br />
                    Знаем как решить,<br />
                    честно
                  </h2>
                </div>
                <div class="hero__scene hero__scene--3" data-hero-scene="3">
                  <div class="hero__scene3">
                    <div class="hero__scene3__copy">
                      <h2 class="hero__title" id="hero-glitch-scene-3-title">
                        Фанатская страховка<br />
                        от переизбытка эмоций
                      </h2>
                      <p class="hero__scene3__lead">
                        Если телевизор попадет под волну ваших эмоций и получит повреждения, мы
                        бесплатно его заменим
                      </p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
