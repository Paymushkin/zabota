name: Publish Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          BASE_PATH: /zabota/

      - name: Remove per-frame hero webp (sprites only)
        run: |
          find dist/hero -type f -regextype posix-extended -regex '.*/(hero-1|hero-2|transfer-1-2|transfer-2-3)-[0-9]+\.webp$' -delete

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deploy
        uses: actions/deploy-pages@v4
